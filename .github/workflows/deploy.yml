name: Production Deployment (Docker)

on:
  push:
    branches:
      - master

jobs:
  deploy-backend-ec2:
    - name: Deploy to EC2
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ec2-user
    key: ${{ secrets.EC2_SSH_KEY }}
    script: |
      docker pull ${{ secrets.DOCKER_USERNAME }}/appraisal-backend:latest
      docker stop appraisal || true
      docker rm appraisal || true
      docker run -d -p 8080:8080 --name appraisal ${{ secrets.DOCKER_USERNAME }}/appraisal-backend:latest

      - name: Copy backend directory to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend"
          target: "/home/${{ secrets.EC2_USERNAME }}/appraisal"

      - name: Execute Docker Compose via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1 - navigate to the backend project directory
            cd /home/${{ secrets.EC2_USERNAME }}/appraisal/backend

            # 2 - build the new image and recreate containers without downtime
            docker compose up --build -d

            # 3 - clean up dangling images from previous builds to prevent disk exhaustion
            docker image prune -f