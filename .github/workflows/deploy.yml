name: CI/CD Backend Deploy

on:
  push:
    branches: ["master"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout repo
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2️⃣ Setup Java
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3️⃣ Build Spring Boot JAR (IMPORTANT FIX)
    - name: Build Backend
      working-directory: appraisal_system
      run: mvn clean package -DskipTests

    # 4️⃣ Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 5️⃣ Build Docker Image (FROM CORRECT FOLDER)
    - name: Build Docker Image
      working-directory: appraisal_system
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/appraisal-backend:latest .

    # 6️⃣ Push Image
    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/appraisal-backend:latest

    # 7️⃣ Deploy to EC2 (UBUNTU FIXED)
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/appraisal-backend:latest
          docker stop appraisal || true
          docker rm appraisal || true
          docker run -d -p 8080:8080 --name appraisal ${{ secrets.DOCKER_USERNAME }}/appraisal-backend:latest