spring.application.name=appraisal_system

# 172.31.10.192 is the private ip address
# use localhost if you are running the application in dev
spring.datasource.url=jdbc:mysql://localhost:3306/appraisal_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

jwt.secret=${JWT_SECRET}
cors.allowed-origins=${ALLOWED_ORIGINS}

spring.output.ansi.enabled=ALWAYS
